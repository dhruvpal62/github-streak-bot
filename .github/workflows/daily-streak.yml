name: Daily Scheduled Maintenance

on:
  schedule:
    # Runs once daily. Adjust this UTC time to match your preferred timezone window.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-scheduled-maintenance
  cancel-in-progress: false

jobs:
  daily-maintenance:
    name: Generate and publish daily activity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"
        env:
          GIT_AUTHOR_NAME: ${{ vars.GIT_AUTHOR_NAME || 'github-streak-bot' }}
          GIT_AUTHOR_EMAIL: ${{ vars.GIT_AUTHOR_EMAIL || 'github-streak-bot@users.noreply.github.com' }}

      - name: Run automation
        run: npm start
        env:
          NODE_ENV: production
          BOT_TIMEZONE: ${{ vars.BOT_TIMEZONE || 'UTC' }}
          RANDOM_DELAY_MINUTES: ${{ vars.RANDOM_DELAY_MINUTES || '45' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          TARGET_REPOSITORIES: ${{ secrets.TARGET_REPOSITORIES || '[]' }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'none' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-flash' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CREATE_ISSUE_ON_FAILURE: ${{ vars.CREATE_ISSUE_ON_FAILURE || 'false' }}

      - name: Commit generated updates
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes generated. Skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MESSAGE="$(node -e "import('./src/generators/commitMessageGenerator.js').then(m => console.log(m.generateCommitMessage()))")"
          git add README.md CHANGELOG.md generated logs || true
          git commit -m "$COMMIT_MESSAGE"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push with retry
        if: steps.commit.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 10))
          done
          echo "Push failed after retries."
          exit 1
